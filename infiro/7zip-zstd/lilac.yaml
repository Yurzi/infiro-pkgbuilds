maintainers:
  - github: Yurzi
    email: yurzi@foxmail.com

build_prefix: extra-x86_64

pre_build_script: |
  import re
  m = re.match(r'^([^-]+)-v(.*)$', _G.newver)
  if m:
    new_pkgver = m.group(1)
    new__pkgver = m.group(2)
  else:
    raise ValueError(f'Unexpected version format: {_G.newver}')

  update_pkgver_and_pkgrel(new_pkgver)

  with open('PKGBUILD', 'r') as f:
    content = f.read()
  content = re.sub(r'^_pkgver=.*$', f'_pkgver={new__pkgver}', content, flags=re.MULTILINE)
  with open('PKGBUILD', 'w') as f:
    f.write(content)

post_build_script: |
  git_pkgbuild_commit()

update_on:
  - source: github
    github: mcmilk/7-Zip-zstd
    prefix: v
    use_latest_tag: true
